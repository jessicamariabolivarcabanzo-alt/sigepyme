<!DOCTYPE html>
<html>
<head>
    <title>Clientes</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            text-align: center;
        }
        table {
            margin: auto;
            border-collapse: collapse;
            width: 60%;
        }
        th, td {
            padding: 10px;
            border: 1px solid #ccc;
        }
        th {
            background: #007bff;
            color: white;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h1>👥 Clientes</h1>

<table>
    <tr>
        <th>Nombre</th>
        <th>Teléfono</th>
        <th>Correo</th>
    </tr>

    {% for c in clientes %}
    <tr>
        <td>{{ c.nombre }}</td>
        <td>{{ c.telefono }}</td>
        <td>{{ c.correo }}</td>
    </tr>
    {% endfor %}
</table>

<a href="/">Volver</a>

</body>
</html>
